[build]
builder = "dockerfile"

[[services]]
name = "backend"
source = "backend"

[services.build]
dockerfilePath = "Dockerfile"

[services.deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30

[[services]]
name = "worker"
source = "backend"

[services.build]
dockerfilePath = "Dockerfile"

[services.deploy]
startCommand = "celery -A app.celery_app worker --loglevel=info --concurrency=2"

[[services]]
name = "frontend"
source = "frontend"

[services.build]
dockerfilePath = "Dockerfile"

[services.deploy]
startCommand = "node server.js"
healthcheckPath = "/"
